<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyansh Prime | Elite Productivity Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* --- CSS VARIABLES (Luxury Dark Palette) --- */
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a1525 0%, #0c0813 100%);
            --glass-bg: rgba(25, 18, 36, 0.45);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-primary: #f3f1f6;
            --text-secondary: #988fa9;
            --accent-gold: #d4af37;
            --accent-gold-glow: rgba(212, 175, 55, 0.3);
            --accent-purple: #7952b3;
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- RESET & BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- AMBIENT GLOW ORBS --- */
        .ambient-orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }
        .orb-1 {
            top: -10%;
            left: -10%;
            background: var(--accent-purple);
        }
        .orb-2 {
            bottom: -10%;
            right: -10%;
            background: #2c1654;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* --- GLASSMORPHISM CARD --- */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        
        /* Premium Subtle Card Border Glow Animation */
        .auth-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), transparent, rgba(121, 82, 179, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* --- BRANDING --- */
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #b5a2cf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .brand-logo span {
            color: var(--accent-gold);
            -webkit-text-fill-color: initial;
            text-shadow: 0 0 15px var(--accent-gold-glow);
        }
        .brand-tagline {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* --- DYNAMIC FORM SWITCHER --- */
        .form-header {
            margin-bottom: 24px;
            text-align: center;
        }
        .form-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .form-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .form-subtitle a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-smooth);
        }
        .form-subtitle a:hover {
            text-shadow: 0 0 8px var(--accent-gold-glow);
        }

        /* --- FORM STYLING --- */
        .form-wrapper {
            position: relative;
            transition: var(--transition-smooth);
        }

        /* State Toggle Classes managed by JS */
        .signup-fields {
            max-height: 0;
            opacity: 0;
            visibility: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        body.signup-mode .signup-fields {
            max-height: 100px;
            opacity: 1;
            visibility: visible;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 4px;
        }
        .input-field-container {
            position: relative;
        }
        .input-field-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
            transition: var(--transition-smooth);
            pointer-events: none;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition-smooth);
        }
        .input-field:focus {
            border-color: rgba(212, 175, 55, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .input-field:focus + i {
            color: var(--accent-gold);
        }

        /* --- OPTIONS ROW (Forgot Pass) --- */
        .form-options {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
            font-size: 13px;
        }
        .forgot-pass {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
        }
        .forgot-pass:hover {
            color: var(--text-primary);
        }

        body.signup-mode .form-options {
            display: none; /* Hide forgot password on signup */
        }

        /* --- BUTTONS --- */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e6c662 0%, #b89229 100%);
            color: #0c0813;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        .btn-primary:hover::before {
            left: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* --- SEPARATOR --- */
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--input-border);
        }
        .separator:not(:empty)::before { margin-right: .5em; }
        .separator:not(:empty)::after { margin-left: .5em; }

        /* --- OAUTH BUTTONS --- */
        .btn-oauth {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
        }
        .btn-oauth:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .btn-oauth img {
            width: 18px;
            height: 18px;
        }

        /* Custom Status/Feedback Message Area for Luxury Polish */
        .status-message {
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
            transition: var(--transition-smooth);
            font-weight: 500;
        }
        .status-error {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }
        .status-success {
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .auth-card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .brand-logo {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="container">
        <div class="auth-card">
            
            <div class="brand">
                <div class="brand-logo">Priyansh <span>Prime</span></div>
                <div class="brand-tagline">Architect Your Focus. Master Your Time.</div>
            </div>

            <div class="form-header">
                <h2 class="form-title" id="formTitle">Welcome Back</h2>
                <p class="form-subtitle" id="formSubtitle">
                    New to Prime? <a href="#" id="toggleStateLink" onclick="toggleAuthMode(event)">Create Account</a>
                </p>
            </div>

            <form id="authForm" onsubmit="handleFormSubmit(event)">
                <div class="form-wrapper">
                    
                    <div class="input-group signup-fields">
                        <label for="userName">Full Name</label>
                        <div class="input-field-container">
                            <input type="text" id="userName" class="input-field" placeholder="E.g., Alexander King">
                            <i class="fa-regular fa-user"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="userEmail">Elite Email Address</label>
                        <div class="input-field-container">
                            <input type="email" id="userEmail" class="input-field" placeholder="you@example.com" required>
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="userPassword">Password</label>
                        <div class="input-field-container">
                            <input type="password" id="userPassword" class="input-field" placeholder="••••••••" required>
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <a href="#" class="forgot-pass">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span id="submitBtnText">Sign In to Dashboard</span>
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                </div>
            </form>

            <div class="separator">or continue with</div>

            <button class="btn btn-oauth" type="button" onclick="handleGoogleAuth()">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                <span>Google Account</span>
            </button>

            <div id="statusArea" class="status-message"></div>

        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9U0gcJRv3w98T3EpeCIa_C33wB7geoDE",
            authDomain: "priyansh-prime.firebaseapp.com",
            projectId: "priyansh-prime",
            storageBucket: "priyansh-prime.firebasestorage.app",
            messagingSenderId: "796799214423",
            appId: "1:796799214423:web:378872a71f95c9fcadd412",
            measurementId: "G-L950V4VB22"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- CORE UI STATE ---
        let isSignUpMode = false;

        const body = document.body;
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const toggleLink = document.getElementById('toggleStateLink');
        const submitBtnText = document.getElementById('submitBtnText');
        const submitBtn = document.getElementById('submitBtn');
        const nameInput = document.getElementById('userName');
        const statusArea = document.getElementById('statusArea');

        /**
         * Helper: Display luxury UI notification context
         */
        function displayStatus(msg, isError = true) {
            statusArea.textContent = msg;
            statusArea.className = isError ? "status-message status-error" : "status-message status-success";
        }

        /**
         * Smoothly switches UI context between Login and Registration states
         */
        function toggleAuthMode(event) {
            event.preventDefault();
            isSignUpMode = !isSignUpMode;
            statusArea.textContent = ""; 

            if (isSignUpMode) {
                body.classList.add('signup-mode');
                formTitle.textContent = "Create Prime Account";
                formSubtitle.innerHTML = `Already tracking? <a href="#" id="toggleStateLink" onclick="toggleAuthMode(event)">Sign In</a>`;
                submitBtnText.textContent = "Begin Your Journey";
                nameInput.setAttribute('required', 'true');
            } else {
                body.classList.remove('signup-mode');
                formTitle.textContent = "Welcome Back";
                formSubtitle.innerHTML = `New to Prime? <a href="#" id="toggleStateLink" onclick="toggleAuthMode(event)">Create Account</a>`;
                submitBtnText.textContent = "Sign In to Dashboard";
                nameInput.removeAttribute('required');
            }
        }

        /**
         * Async Firebase Email/Password Handler with Redirect Integration
         */
        async function handleFormSubmit(event) {
            event.preventDefault();
            statusArea.textContent = "";
            
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPassword').value;
            
            submitBtn.disabled = true;

            try {
                if (isSignUpMode) {
                    const name = nameInput.value;
                    displayStatus("Configuring your premium account...", false);
                    
                    const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                    const user = userCredential.user;

                    await db.collection("users").doc(user.uid).set({
                        fullName: name,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    displayStatus("Workspace configured beautifully. Diverting...", false);
                } else {
                    displayStatus("Verifying credentials...", false);
                    await auth.signInWithEmailAndPassword(email, pass);
                    displayStatus("Access granted. Loading workspace...", false);
                }
                
                // Absolute execution redirect to tracker layout
                setTimeout(() => {
                    window.location.href = "tracker.html";
                }, 1000);

            } catch (error) {
                displayStatus(error.message, true);
                submitBtn.disabled = false;
            }
        }

        /**
         * Async Firebase Google OAuth Handler with Redirect Integration
         */
        async function handleGoogleAuth() {
            statusArea.textContent = "";
            const provider = new firebase.auth.GoogleAuthProvider();
            
            try {
                displayStatus("Connecting safely with Google...", false);
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                const userRef = db.collection("users").doc(user.uid);
                const doc = await userRef.get();

                if (!doc.exists) {
                    await userRef.set({
                        fullName: user.displayName || "Elite User",
                        email: user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                displayStatus("Authenticated seamlessly. Diverting...", false);
                
                // Absolute execution redirect to tracker layout
                setTimeout(() => {
                    window.location.href = "tracker.html";
                }, 1000);
                
            } catch (error) {
                displayStatus(error.message, true);
            }
        }
    </script>
</body>
</html>
